function applySelectedFont(){

    let font = document.getElementById("fontSelect").value;

    lyricsBox.style.fontFamily = font;

}

document.getElementById("fontLoader").addEventListener("change", async function(e){

    let file = e.target.files[0];

    if(!file) return;

    let fontName = file.name.split(".")[0];

    let url = URL.createObjectURL(file);

    let font = new FontFace(fontName, `url(${url})`);

    await font.load();

    document.fonts.add(font);

    // apply immediately
    lyricsBox.style.fontFamily = fontName;

    // add to dropdown
    let option = document.createElement("option");
    option.value = fontName;
    option.textContent = fontName;

    document.getElementById("fontSelect").appendChild(option);

    document.getElementById("fontSelect").value = fontName;

    showToast("Font Loaded");
});
    
function showToast(message, actionText, actionFn){

    let container = document.getElementById("toastContainer");

    // 🔥 LIMIT: max 2 toasts
    while(container.children.length >= 2){
        container.firstChild.remove(); // remove oldest
    }

    let toast = document.createElement("div");
    toast.className = "toast";

    let text = document.createElement("span");
    text.innerText = message;

    toast.appendChild(text);

    if(actionText && actionFn){
        let btn = document.createElement("button");
        btn.innerText = actionText;

        btn.onclick = () => {
            actionFn();
            toast.remove();
        };

        toast.appendChild(btn);
    }

    container.appendChild(toast);

    requestAnimationFrame(()=>{
        toast.classList.add("show");
    });

    setTimeout(()=>{
        toast.classList.remove("show");
        setTimeout(()=> toast.remove(), 250);
    }, 3000);
}

function showSyllableStats(){

    let totalSyllables = 0;
    let rhymedSyllables = 0;

    function countSyllables(text){
        let matches = text.toLowerCase().match(/[aeiou]/g);
        return matches ? matches.length : 0;
    }

    let selection = window.getSelection();
    let selectedWords = [];

    // ✅ CASE 1: TEXT SELECTED
    if(selection && selection.rangeCount > 0 && !selection.isCollapsed){

        let range = selection.getRangeAt(0);

        let allWords = Array.from(document.querySelectorAll(".word"));

        allWords.forEach(word => {
            if(range.intersectsNode(word)){
                selectedWords.push(word);
            }
        });

    }

    // ✅ fallback → full song
    let words = selectedWords.length > 0
        ? selectedWords
        : Array.from(document.querySelectorAll(".word"));

    // ⭐ TOTAL syllables
    words.forEach(word => {
        totalSyllables += countSyllables(word.textContent);
    });

    // ⭐ RHYMED syllables (only inside selected words)
    words.forEach(word => {

        let highlights = word.querySelectorAll(".highlight");

        highlights.forEach(h => {

            let style = window.getComputedStyle(h);

            if(style.backgroundSize !== "0% 100%"){
                rhymedSyllables += countSyllables(h.textContent);
            }

        });

    });

    let percent = totalSyllables === 0 
        ? 0 
        : (rhymedSyllables / totalSyllables) * 100;

    alert(
        (selectedWords.length > 0 ? "SELECTED TEXT\n\n" : "FULL SONG\n\n") +
        "SYLLABLE BASED\n\n" +
        "Rhyme %: " + percent.toFixed(1) + "%\n\n" +
        "Total Syllables: " + totalSyllables + "\n" +
        "Rhymed Syllables: " + rhymedSyllables
    );
}

lyricsBox.addEventListener("pointerdown", (e) => {

    let now = Date.now();

    if(now - lastTapTime < 300){
        tapCount++;
    } else {
        tapCount = 1;
    }

    lastTapTime = now;

    // clear previous timer
    if(tapTimeout){
        clearTimeout(tapTimeout);
    }

    tapTimeout = setTimeout(() => {

        if(tapCount === 3){
            undo();
        }
        else if(tapCount === 4){
            toggleMode();
        }

        tapCount = 0;

    }, 250); // wait to see if more taps come
});

});

document.getElementById("forward5").addEventListener("click", () => {
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
});


document.getElementById("audioFile").onchange = function(){

    let file = this.files[0];
    if(!file) return;

    audio.src = URL.createObjectURL(file);

    audio.onloadedmetadata = ()=>{
        seekBar.max = audio.duration;
    };

};

function togglePlay(){

    if(audio.paused){
        audio.play();
        playBtn.innerText = "Pause";
        startAudioLoop();
    }
    else{
        audio.pause();
        playBtn.innerText = "Play";
    }

}

function showRhymeStats(){

    let totalWords = 0;
    let rhymedWords = 0;

    // get all words (works for old + new projects)
    let words = Array.from(document.querySelectorAll(".word"));

    totalWords = words.length;

    words.forEach(word => {

        let highlights = word.querySelectorAll(".highlight");

        let isRhymed = false;

        highlights.forEach(h => {

            let style = window.getComputedStyle(h);

            // if ANY highlight is visible → word counts
            if(style.backgroundSize !== "0% 100%"){
                isRhymed = true;
            }

        });

        if(isRhymed){
            rhymedWords++;
        }

    });

    let percent = totalWords === 0 
        ? 0 
        : (rhymedWords / totalWords) * 100;

    alert(
        "Rhyme Percentage: " + percent.toFixed(1) + "%\n\n" +
        "Total Words: " + totalWords + "\n" +
        "Rhymed Words: " + rhymedWords
    );
}
        
function startAudioLoop(){

    function loop(){

        if(audio.paused) return;

        seekBar.value = audio.currentTime;

        let m = Math.floor(audio.currentTime / 60);
        let s = Math.floor(audio.currentTime % 60);

        timeLabel.innerText = m + ":" + (s < 10 ? "0"+s : s);

        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
}

seekBar.oninput = function(){
    audio.currentTime = this.value;
};

            seekBar.max = audio.duration;

function pushUndoState(){

    undoStack.push(display.innerHTML);

    if(undoStack.length > 100){
        undoStack.shift();   // limit memory
    }

    redoStack = [];   // new action kills redo history
}

function undo(){

    if(undoStack.length === 0) return;

    redoStack.push(display.innerHTML);

    let state = undoStack.pop();

    display.innerHTML = state;

    /* ⭐ rebuild word list after DOM restore */
    allWords = Array.from(display.querySelectorAll(".word"));
    showToast("Undo done", "Redo", redo);
}

function redo(){

    if(redoStack.length === 0) return;

    undoStack.push(display.innerHTML);

    let state = redoStack.pop();

    display.innerHTML = state;

    allWords = Array.from(display.querySelectorAll(".word"));
    showToast("Redo done");
}

function autoCompleteLineEnd(){

    let currentWord = allWords[wordPointer];
    if(!currentWord) return;

    let currentLine = Number(currentWord.dataset.line);

    let remaining = [];

    // collect remaining words in same line
    for(let i = wordPointer; i < allWords.length; i++){

        let w = allWords[i];

        if(Number(w.dataset.line) !== currentLine) break;

        remaining.push(w);

        if(w.dataset.last === "true") break;
    }

    // ⭐ If only 1 or 2 words remaining → auto highlight
    if(remaining.length > 0 && remaining.length <= 2){

        console.log("✨ Auto completing line end");

        remaining.forEach(w=>{
            triggerWordAnimation(w);
            wordPointer++;
        });

        lastCompletedLine = currentLine;
    }
}

// Swipe starts on pointer down
lyricsBox.addEventListener("pointerdown", (e) => {
    if (mode !== "recording") return;
    autoCompleteLineEnd();
    swipeActive = true;          // ✅ Enable highlighting
    swipeStartX = e.clientX;
    baseWordPointer = wordPointer;

    console.log("Swipe started, swipeActive =", swipeActive);
});

window.addEventListener("pointermove", (e) => {
    if (!swipeActive) return;

    let now = performance.now();
    let dt = now - lastMoveTime;

    let dx = e.clientX - swipeStartX;

    if (dt > 0){
        swipeVelocity = Math.abs(dx / dt);   // px per ms
    }

    lastMoveTime = now;

    let distance = dx;
    if (distance <= 0) return;

    let wordsToAdvance = Math.floor(distance / pixelsPerWord);
    let targetPointer = baseWordPointer + wordsToAdvance;

    while (wordPointer < targetPointer) {
        let nextWord = allWords[wordPointer];
        if (!nextWord) return;

        triggerWordAnimation(nextWord);
        wordPointer++;

        swipeStartX = e.clientX;
        baseWordPointer = wordPointer;

        if (nextWord.dataset.last === "true") {
            swipeActive = false;
            lastCompletedLine = Number(nextWord.dataset.line);
        }

        return;
    }
});

// Re-enable swipe when finger lifts
window.addEventListener("pointerup", () => {
    if (mode !== "recording") return;

    swipeActive = true;           // ✅ Ready for next line
    console.log("Swipe ended, swipeActive =", swipeActive);

function autoScrollToWord(word){

    let box = lyricsBox;

    let wordRect = word.getBoundingClientRect();
    let boxRect = box.getBoundingClientRect();

    let wordCenter = wordRect.top + wordRect.height/2;
    let boxCenter = boxRect.top + box.clientHeight/2;

    let diff = wordCenter - boxCenter;

    targetScroll = box.scrollTop + diff;

    startSmoothScroll();

}

function startSmoothScroll(){

    if(mode !== "recording") return;

    if(scrolling) return;

    scrolling = true;

    function loop(){

        if(mode !== "recording"){
            stopAutoScroll();
            return;
        }

        let box = lyricsBox;

        let current = box.scrollTop;
        let diff = targetScroll - current;

        box.scrollTop = current + diff * 0.022;

        if(Math.abs(diff) > 0.5){
            scrollRAF = requestAnimationFrame(loop);
        }else{
            scrolling = false;
        }

    }

    scrollRAF = requestAnimationFrame(loop);

}

function stopAutoScroll(){

    scrolling = false;

    if(scrollRAF){
        cancelAnimationFrame(scrollRAF);
        scrollRAF = null;
    }

}

function loadText(){
    pushUndoState();
    let text = input.value;
    if(!text.trim()) return;

    display.innerHTML = "";

    let lines = text.split("\n");

    lines.forEach((lineText, lineIndex)=>{

        let lineDiv = document.createElement("div");
        lineDiv.className = "line";

        let words = lineText.split(/\s+/).filter(w => w.length);

        words.forEach((w, i)=>{

            let span = document.createElement("span");
            span.className = "word";
            span.textContent = w;   // ⭐ safer than innerHTML

            span.dataset.line = lineIndex;

            if(i === words.length - 1){
                span.dataset.last = "true";
            }

            lineDiv.appendChild(span);

            /* ⭐ REAL SPACE NODE */
            if(i !== words.length - 1){
                lineDiv.appendChild(document.createTextNode(" "));
            }

        });

        display.appendChild(lineDiv);

    });

    allWords = Array.from(display.querySelectorAll(".word"));

    console.log(
        "WORDS:",
        allWords.map(w => ({
            text: w.textContent,
            last: w.dataset.last,
            line: w.dataset.line
        }))
    );

}

function clearSelectionFormatting(range){

    pushUndoState();

    let word = range.startContainer.parentElement.closest(".word");
    if(!word) return;

    /* ⭐ get all formatting spans inside this word */
    let formats = word.querySelectorAll(".highlight, span[style*='underline']");

    formats.forEach(f=>{

        /* ⭐ check if selection overlaps this formatting span */
        let spanRange = document.createRange();
        spanRange.selectNodeContents(f);

        if(
            range.compareBoundaryPoints(Range.END_TO_START, spanRange) < 0 &&
            range.compareBoundaryPoints(Range.START_TO_END, spanRange) > 0
        ){

            let parent = f.parentNode;

            while(f.firstChild){
                parent.insertBefore(f.firstChild, f);
            }

            parent.removeChild(f);
        }

    });

    display.normalize();

    allWords = Array.from(display.querySelectorAll(".word"));
}

lyricsBox.addEventListener("pointerup", function(){

    if(mode !== "highlight") return;
    
    let sel = window.getSelection();
    if(!sel.rangeCount) return;

    let range = sel.getRangeAt(0);

    if(range.toString().trim().length === 0) return;

    let startWord = range.startContainer.parentElement.closest(".word");
    let endWord = range.endContainer.parentElement.closest(".word");

    if(!startWord || startWord !== endWord) return;

    if(toolMode === "highlight"){
        pushUndoState();
        let content = range.extractContents();

        let span = document.createElement("span");
        span.className = "highlight";
        span.dataset.color = currentColor;

        span.appendChild(content);
        range.insertNode(span);
        saveProject()
    }

    else if(toolMode === "underline"){
        pushUndoState();
        let content = range.extractContents();

        let span = document.createElement("span");
        span.style.textDecoration = "underline";

        span.appendChild(content);
        range.insertNode(span);
        saveProject()

    }

    else if(toolMode === "clear"){
        
        clearSelectionFormatting(range);

    }

    sel.removeAllRanges();

});

    if(mode === "highlight"){

        currentLineIndex = 0;
        allWords = Array.from(display.querySelectorAll(".word"));
wordPointer = 0;
progressAccumulator = 0;

        document.querySelectorAll(".highlight").forEach(h=>{
            h.style.backgroundSize = "0% 100%";
        });
        
        

        document.querySelectorAll(".word").forEach(word=>{

            word.onclick = function(e){

                e.stopPropagation();

                if(word.classList.contains("activeWord")) return;

                word.classList.add("activeWord");
                word.style.opacity = 1;

                let highlights = Array.from(word.querySelectorAll(".highlight"));

                let delay = 0;

                highlights.forEach(h=>{

                    setTimeout(()=>{

                        h.style.transition = "background-size .12s linear";
                        h.style.backgroundSize = "100% 100%";

                    }, delay);

                    delay += 40;   // sequential highlight timing

                });

            };

        });

    }
    else{

        /* ENTER HIGHLIGHT MODE */
        stopAutoScroll();
targetScroll = lyricsBox.scrollTop;
        mode = "highlight";
        display.classList.remove("recording");
        modeBtn.innerText = "Recording Mode";

        lyricsBox.style.touchAction = "auto";

        stopAutoScroll();                 // ⭐ VERY IMPORTANT
        swipeActive = false;
        activePointerId = null;
        currentWordIndex = -1;

        /* restore highlights */
        document.querySelectorAll(".highlight").forEach(h=>{
            h.style.backgroundSize = "100% 100%";
        });

        document.querySelectorAll(".word").forEach(word=>{
            word.onclick = null;
            word.classList.remove("activeWord");
            word.style.opacity = "";
        });

    }

}

let currentProject = null;

function getProjects(){
    return JSON.parse(localStorage.getItem("lyricsProjects") || "{}");
}

function setProjects(data){
    localStorage.setItem("lyricsProjects", JSON.stringify(data));
}

function renderProjects(){

    let data = getProjects();

    projectsList.innerHTML = "";

    Object.keys(data).forEach(name=>{

        let div = document.createElement("div");

        div.innerHTML = `
            <button onclick="openProject('${name}')">${name}</button>
            <button onclick="deleteProject('${name}')">❌</button>
        `;

        projectsList.appendChild(div);

    });

}

function createProject(){

    let name = projectName.value.trim();
    if(!name) return;

    let data = getProjects();

    data[name] = {
        text:"",
        html:"",
        align:"left",
        fontSize:34,
        lineGap:1.6
    };

    setProjects(data);
    renderProjects();
}

function deleteProject(name){

    let data = getProjects();
    delete data[name];
    setProjects(data);
    renderProjects();

    if(currentProject === name){
        currentProject = null;
        display.innerHTML="";
        input.value="";
    }

}

function openProject(name){

    let data = getProjects();
    let p = data[name];

    currentProject = name;

    input.value = p.text;
    display.innerHTML = p.html;

    display.style.textAlign = p.align;
    display.style.fontSize = p.fontSize + "px";
    display.style.lineHeight = p.lineGap;

    goEditor();
}

function saveProject(){
// Save the song in localStorage as Base64

    if(!currentProject){
        alert("Open or create project first");
        return;
    }

    let data = getProjects();

    data[currentProject] = {
        text: input.value,
        html: display.innerHTML,
        align: display.style.textAlign || "left",
        fontSize: parseFloat(display.style.fontSize) || 34,
        lineGap: parseFloat(display.style.lineHeight) || 1.6
    };

    setProjects(data);


}

function exportProject(){

    if(!currentProject){
        alert("No project selected");
        return;
    }

    let data = getProjects()[currentProject];

    let json = JSON.stringify(data);

    let blob = new Blob([json], { type: "application/json" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = currentProject + ".lyricsproj";

    a.click();
}

function importProject(){

    let fileInput = document.getElementById("importFile");
    let file = fileInput.files[0];

    if(!file){
        alert("Select a file first");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        let data = JSON.parse(e.target.result);

        let name = prompt("Enter project name:");

        if(!name) return;

        let allProjects = getProjects();

        allProjects[name] = data;

        setProjects(allProjects);

        alert("Imported!");
    };

    reader.readAsText(file);
}

function copyProject(){

    if(!currentProject){
        alert("No project open");
        return;
    }

    let data = getProjects()[currentProject];

    let exportData = {
        text: data.text,
        html: data.html,
        align: data.align,
        fontSize: data.fontSize,
        lineGap: data.lineGap
    };

    let json = JSON.stringify(exportData);

    // 🔥 REAL compression
    let compressed = LZString.compressToBase64(json);

    navigator.clipboard.writeText(compressed)
        .then(() => alert("Copied (compressed) 🚀"))
        .catch(() => alert("Copy failed"));
}

function pasteProject(){

    let inputData = prompt("Paste project data:");
    if(!inputData) return;

    try{

        // 🔥 Decompress
        let json = LZString.decompressFromBase64(inputData);

        if(!json){
            throw "Decompression failed";
        }

        let data = JSON.parse(json);

        input.value = data.text;
        display.innerHTML = data.html;

        display.style.textAlign = data.align || "left";
        display.style.fontSize = (data.fontSize || 34) + "px";
        display.style.lineHeight = data.lineGap || 1.6;

        allWords = Array.from(display.querySelectorAll(".word"));

        alert("Project loaded! ✅");

    } catch(e){
        alert("Invalid or corrupted data ❌");
        console.error(e);
    }
}

function goEditor(){
    projectsScreen.style.display="none";
    editorScreen.style.display="block";
}

function goHome(){
    editorScreen.style.display="none";
    projectsScreen.style.display="block";
}

function underlineSelection(){

    if(mode !== "highlight") return;

    let sel = window.getSelection();
    if(!sel.rangeCount) return;

    let range = sel.getRangeAt(0);

    if(range.toString().trim().length === 0) return;

    let startWord = range.startContainer.parentElement.closest(".word");
    let endWord = range.endContainer.parentElement.closest(".word");

    if(startWord !== endWord) return;

    let content = range.extractContents();

    let span = document.createElement("span");
    span.style.textDecoration = "underline";

    span.appendChild(content);
    range.insertNode(span);

    sel.removeAllRanges();
}
